name: Contribution Approved

on:
  issues:
    types: ["labeled"]

concurrency: add_internships

jobs:
  run-python-script:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'approved'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Process contribution
        id: python_script
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: uv run main.py contribution process $GITHUB_EVENT_PATH

      - name: Update READMEs
        id: python_script_readme
        run: uv run main.py readme update

      - name: Commit files
        if: success()
        run: |
          git config --local user.email ${{ steps.python_script.outputs.commit_email }}
          git config --local user.name ${{ steps.python_script.outputs.commit_username }}
          git add .github/scripts/listings.json
          git add README.md
          git add README-Off-Season.md
          git diff-index --quiet HEAD || (git commit -a -m "${{ steps.python_script.outputs.commit_message }}" --allow-empty)

      - name: Push changes
        if: success()
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: dev

      - name: Post Summary and Close Issue (Bulk Mark Inactive)
        run: |
          cat << 'EOF' > comment.txt
          ${{ steps.python_script.outputs.summary_comment }}
          EOF
          gh issue comment ${{ github.event.issue.number }} --body-file comment.txt
          gh issue close --comment "✅ Bulk update complete! The README has been updated and changes have been committed. Auto-closing issue." ${{ github.event.issue.number }}
        if: success() && contains(github.event.issue.labels.*.name, 'bulk_mark_inactive')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto Close Issue (Regular Contributions)
        run: gh issue close --comment "Your contribution was accepted. Auto-closing issue" ${{ github.event.issue.number }}
        if: success() && !contains(github.event.issue.labels.*.name, 'bulk_mark_inactive')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Problem With Action
        run: gh issue comment ${{ github.event.issue.number }} --body "There was an error with our github action. Error - ${{ steps.python_script.outputs.error_message }} ${{ steps.python_script_readme.outputs.error_message }}"
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
